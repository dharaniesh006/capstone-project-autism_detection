{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Autism Prediction System</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">Autism Prediction System</a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="https://meet.google.com/new" target="_blank" class="nav-link">New Meeting</a></li>
                <li><a href="/login1" class="nav-link">Admin</a></li>
                <li>
                    <button id="theme-toggle-btn" class="theme-toggle" aria-label="Toggle Theme">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" /></svg>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="glass-card">
            <h2 class="title-glow">Create Account</h2>
            <p class="text-center" style="margin-bottom: 24px;">Join us to access Autism Prediction System</p>

            {% if msg %}
            <div class="alert-error">
                {{ msg }}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password1">Password</label>
                    <input type="password" id="password1" name="password1" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label for="password2">Confirm Password</label>
                    <input type="password" id="password2" name="password2" placeholder="Re-enter your password" required>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn-primary">Create Account</button>
                </div>
            </form>

            <div class="text-center mt-4" style="border-top: var(--glass-border); padding-top: 24px;">
                Already have an account? <a href="/login" class="link-custom">Sign in instead</a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
